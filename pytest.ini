[pytest]
addopts = --assert=plain -p no:cacheprovider -m "not slow and not gpu and not formal and not destructive and not artifact"
markers =
    fast: fast static/unit checks suitable for default local feedback
    contract: contract-level fixture checks that avoid real runs/data/cache writes
    smoke: entrypoint or dry-run smoke checks; no real training
    slow: expensive checks excluded from the default pytest path
    gpu: checks requiring current tmux CUDA visibility and explicit authorization
    formal: formal training/eval/rerank checks requiring explicit authorization
    destructive: checks that may remove or overwrite artifacts; excluded by default
    artifact: checks that inspect real repo artifacts; excluded from default pytest
