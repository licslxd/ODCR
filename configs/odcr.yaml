project:
  name: CSB-ODCR
  method_name: CSB-ODCR
  method_full_name: "CSB-ODCR: Causal Structure Bottleneck for Orthogonal Disentangled Counterfactual Recommendation"
  method_family: csb_odcr
  default_task: 2
  seed: 3407
  run_root: runs
  cache_dir: cache
  data_dir: data
  merged_dir: merged

env:
  python_bin: python
  conda_env: D4C
  offline: true
  local_files_only: true
  models_dir: artifacts/models
  step5_text_model: artifacts/models/google__flan-t5-xl
  sentence_embed_model: artifacts/models/BAAI__bge-large-en-v1.5
  embed_dim: 1024

hardware:
  active: default
  preprocess:
    gpu_ids: [0, 1]
  profiles:
    default:
      ddp_world_size: 2
      num_proc: auto
      max_num_proc: 8
      reserved_cpu: 2
      max_parallel_cpu: 12
      dataloader_num_workers_train: 4
      dataloader_num_workers_valid: 2
      dataloader_num_workers_test: 2
      dataloader_prefetch_factor_train: 2
      dataloader_prefetch_factor_valid: 2
      dataloader_prefetch_factor_test: 2
      omp_num_threads: 1
      mkl_num_threads: 1
      tokenizers_parallelism: false
      pin_memory: true
      persistent_workers: true
      non_blocking_h2d: true
      cuda_visible_devices: "0,1"
    a100_1gpu_fast:
      ddp_world_size: 1
      num_proc: auto
      max_num_proc: 4
      reserved_cpu: 2
      dataloader_num_workers_train: 2
      dataloader_num_workers_valid: 2
      dataloader_num_workers_test: 2
      dataloader_prefetch_factor_train: 2
      dataloader_prefetch_factor_valid: 2
      dataloader_prefetch_factor_test: 2
      max_parallel_cpu: 8
      omp_num_threads: 1
      mkl_num_threads: 1
      tokenizers_parallelism: false
      pin_memory: true
      persistent_workers: true
      non_blocking_h2d: true
      cuda_visible_devices: "0"

tasks:
  1: {source: AM_Electronics, target: AM_CDs, scenario: legacy_scenario, direction: legacy}
  2: {source: AM_Movies, target: AM_CDs, scenario: strong_related, direction: forward}
  3: {source: AM_CDs, target: AM_Electronics, scenario: legacy_scenario, direction: legacy}
  4: {source: AM_Movies, target: AM_Electronics, scenario: legacy_scenario, direction: legacy}
  5: {source: AM_CDs, target: AM_Movies, scenario: strong_related, direction: reverse}
  6: {source: AM_Electronics, target: AM_Movies, scenario: legacy_scenario, direction: legacy}
  7: {source: Yelp, target: TripAdvisor, scenario: weak_cross_platform, direction: reverse}
  8: {source: TripAdvisor, target: Yelp, scenario: weak_cross_platform, direction: forward}

preprocess:
  datasets: [AM_Electronics, AM_CDs, AM_Movies, Yelp, TripAdvisor]
  a:
    datasets: [AM_Electronics, AM_CDs, AM_Movies, Yelp, TripAdvisor]
    resume: true
    skip_completed: true
    workers: 1
  b:
    datasets: [AM_Electronics, AM_CDs, AM_Movies, Yelp, TripAdvisor]
    gpu_ids: [0, 1]
    batch_size: 512
    read_chunk_rows: 100000
    group_shard_size: 4096
    tokenizer_parallelism_enabled: true
    tokenizer_threads_per_worker: 4
    tokenizer_total_threads: 8
    prefetch_batches: 2
    pin_memory: true
    non_blocking_h2d: true
    async_prefetch_enabled: true
    token_aware_batching_enabled: false
    max_tokens_per_gpu_batch: null
    cpu_cores_reserved: 2
    cpu_cores_available: 12
    grouped_text_cache_enabled: true
    grouped_text_cache_dir: cache/preprocess_b
    grouped_text_cache_version: preprocess_b_grouped_text_cache_v1
    bf16_enabled: true
    tf32_enabled: true
    verify_sample_size: 8
    verify_seed: 7
    resume: true
    skip_completed: true
  c:
    datasets: [AM_Electronics, AM_CDs, AM_Movies, Yelp, TripAdvisor]
    gpu_ids: [0, 1]
    chunk_batch_size: 512
    tokenizer_parallelism_enabled: true
    tokenizer_threads_per_worker: 4
    tokenizer_total_threads: 8
    prefetch_batches: 2
    pin_memory: true
    non_blocking_h2d: true
    async_prefetch_enabled: true
    scheduling_policy: lpt_by_token_windows
    cpu_cores_reserved: 2
    cpu_cores_available: 12
    bf16_enabled: true
    tf32_enabled: true
    tokenizer_hotpath_enabled: true
    token_window_cache_enabled: true
    token_window_cache_dir: cache/preprocess_c
    token_window_cache_version: preprocess_c_token_windows_v3
    token_window_cache_shard_size: 4096
    resume: true
    skip_completed: true

step3:
  method:
    name: CSB-ODCR
    full_name: "CSB-ODCR: Causal Structure Bottleneck for Orthogonal Disentangled Counterfactual Recommendation"
    family: csb_odcr
    model_family: csb_odcr
    display_name: CSB-ODCR
  experiment_profile: csb_odcr_sidecar_stable
  experiment_profiles:
    csb_odcr_sidecar_stable:
      ablation_profile: csb_odcr_sidecar_stable
      candidate_role: G1S-sidecar-stable
      safe_profile: true
      recommended_next_full: true
      primary_training: rating_only
      csb_mode: sidecar
      gradient_firewall: true
      controlled_injection_formal_train: false
      light_explainer_step3_loss: false
      conflict_routing_step3_primary: false
      csb_rating_safe_adapter_train: false
      paper_metric_gate: false
      csb_enabled: true
      controlled_injection_enabled: false
      rcr_uci_enabled: true
      ccv_fca_diversity_enabled: true
      conflict_routing_enabled: false
      formal_allowed: true
      description: contract-first primary rating scorer with detached CSB sidecar Z export
      scheduler:
        warmup_ratio: 0.10
      train:
        batch_size: 1408
        per_gpu_batch_size: 704
        lr: 7.0e-4
        max_grad_norm: 0.5
        max_epochs: 40
        backend:
          train_precision: bf16
          allow_tf32: true
          amp_autocast: true
          grad_scaler: false
    csb_odcr_full:
      ablation_profile: csb_odcr_full
      csb_enabled: true
      controlled_injection_enabled: true
      rcr_uci_enabled: true
      ccv_fca_diversity_enabled: true
      conflict_routing_enabled: true
      formal_allowed: false
      description: full CSB-ODCR
    csb_odcr_full_safe:
      ablation_profile: csb_odcr_full
      candidate_role: G1S-safe
      safe_profile: true
      recommended_next_full: false
      deprecated: true
      blocked_reason: superseded_by_csb_odcr_sidecar_stable
      csb_enabled: true
      controlled_injection_enabled: true
      rcr_uci_enabled: true
      ccv_fca_diversity_enabled: true
      conflict_routing_enabled: true
      formal_allowed: false
      description: full CSB-ODCR with epoch-boundary OOM recovery batch headroom
      scheduler:
        warmup_ratio: 0.10
      train:
        batch_size: 1408
        per_gpu_batch_size: 704
        lr: 7.0e-4
        max_grad_norm: 0.5
        max_epochs: 40
        backend:
          train_precision: bf16
          allow_tf32: true
          amp_autocast: true
          grad_scaler: false
    csb_odcr_full_safe640:
      ablation_profile: csb_odcr_full
      candidate_role: G1S-safe640
      safe_profile: true
      fallback_only: true
      not_default: true
      csb_enabled: true
      controlled_injection_enabled: true
      rcr_uci_enabled: true
      ccv_fca_diversity_enabled: true
      conflict_routing_enabled: true
      formal_allowed: false
      description: fallback-only full CSB-ODCR profile if 704 epoch-boundary probe fails
      train:
        batch_size: 1280
        per_gpu_batch_size: 640
        lr: 7.0e-4
        max_grad_norm: 0.5
        max_epochs: 40
        backend:
          train_precision: bf16
          allow_tf32: true
          amp_autocast: true
          grad_scaler: false
    csb_odcr_wo_csb:
      ablation_profile: csb_odcr_wo_csb
      csb_enabled: false
      controlled_injection_enabled: false
      rcr_uci_enabled: true
      ccv_fca_diversity_enabled: true
      conflict_routing_enabled: false
      formal_allowed: false
      description: ablate causal structure bottleneck signals
    csb_odcr_wo_controlled_injection:
      ablation_profile: csb_odcr_wo_controlled_injection
      csb_enabled: true
      controlled_injection_enabled: false
      rcr_uci_enabled: true
      ccv_fca_diversity_enabled: true
      conflict_routing_enabled: true
      formal_allowed: false
      description: ablate structural prefix and gated adapter injection
    csb_odcr_wo_rcr_uci:
      ablation_profile: csb_odcr_wo_rcr_uci
      csb_enabled: true
      controlled_injection_enabled: true
      rcr_uci_enabled: false
      ccv_fca_diversity_enabled: true
      conflict_routing_enabled: true
      formal_allowed: false
      description: ablate downstream reliability routing and uncertainty calibration
    csb_odcr_wo_ccv_fca_diversity:
      ablation_profile: csb_odcr_wo_ccv_fca_diversity
      csb_enabled: true
      controlled_injection_enabled: true
      rcr_uci_enabled: true
      ccv_fca_diversity_enabled: false
      conflict_routing_enabled: true
      formal_allowed: false
      description: ablate downstream control and diversity mechanisms
    csb_odcr_wo_conflict_routing:
      ablation_profile: csb_odcr_wo_conflict_routing
      csb_enabled: true
      controlled_injection_enabled: true
      rcr_uci_enabled: true
      ccv_fca_diversity_enabled: true
      conflict_routing_enabled: false
      formal_allowed: false
      description: ablate rating-anchor auxiliary conflict routing
  csb_odcr:
    enabled: true
    contract:
      schema_version: csb_odcr_csb_packet/1
      cross_stage_contract_version: csb_odcr_cross_stage_contract/1
      required_tensor_fields: [z_content, z_style, z_domain, z_uncertainty]
    bottleneck:
      structure_branch_stop_gradient: true
    controlled_injection:
      enabled: false
      mode: structural_prefix
      structural_prefix_tokens: 4
      gate_init: 0.35
      rating_safe_injection: false
      rating_allowed_fields: [z_content, z_uncertainty]
      explainer_allowed_fields: [z_content, z_style, z_domain, z_uncertainty]
    conflict_routing:
      enabled: false
      mode: csb_branch_only
      rating_anchor: L_rating_shared
      explanation_anchor: L_light_explainer
      diversity_guard: [DIST-1, DIST-2]
      aux_soft_cap: 0.75
      projection_threshold: -0.05
      dynamic_downweight: true
      formal_allowed: false
      ddp_graph_safe_zero_required: true
  ddp:
    find_unused_parameters: false
    static_graph: false
    graph_safety_preflight: true
  loss_semantics:
    specific_separation_margin: 0.60
    variance_target_std: 0.70
    variance_eps: 1.0e-4
    orthogonal_eps: 1.0e-8
    cosine_eps: 1.0e-8
    sample_weight_eps: 1.0e-6
    prototype_separation_eps: 1.0e-8
    quality_weight:
      evidence_base: 0.55
      evidence_scale: 0.45
      anchor_base: 0.40
      anchor_scale: 0.60
  structured_losses:
    orthogonal:
      weight: 0.20
      xcov_weight: 1.00
      cosine_weight: 0.25
    variance_weight: 0.10
    shared_invariance_weight: 0.18
    specific_separation_weight: 0.16
    anchor_alignment_weight: 0.08
    content_alignment_weight: 0.12
    style_alignment_weight: 0.12
    shared_prototype_weight: 0.08
    domain_style_alignment_weight: 0.06
    local_style_alignment_weight: 0.06
    polarity_alignment_weight: 0.05
    residual_specific_weight: 0.025
    prototype_separation_weight: 0.04
    light_explainer_weight: 0.0
  scenario_profiles:
    legacy_scenario:
      tokenizer:
        max_length: 48
      evidence:
        max_evidence_length: 48
      train:
        lr: 5.0e-4
    strong_related:
      tokenizer:
        max_length: 48
      evidence:
        max_evidence_length: 48
      train:
        lr: 7.0e-4
    weak_cross_platform:
      tokenizer:
        max_length: 64
      evidence:
        max_evidence_length: 64
      train:
        lr: 3.0e-4
  task_profiles:
    task2_am_movies_to_cds:
      task_id: 2
      source: AM_Movies
      target: AM_CDs
      scenario: strong_related
      direction: forward
      active_profile: strong_forward_g1s
      profile_id: task2_strong_forward_g1s
      candidate: G1S
      formal_allowed: true
      probe_only: false
      train:
        batch_size: 1536
        per_gpu_batch_size: 768
        lr: 7.0e-4
        max_grad_norm: 0.5
        backend:
          train_precision: bf16
          allow_tf32: true
          amp_autocast: true
          grad_scaler: false
      tokenizer:
        max_length: 48
      evidence:
        max_evidence_length: 48
      scheduler:
        name: warmup_cosine
        warmup_ratio: 0.06
        min_lr_ratio: 0.05
      cross_rank_structured_gather:
        enabled: true
        mode: local_gradient_context
      effective_pool_expected: 1536
      memory:
        activation_checkpointing: false
        profile_buffer_policy: gpu_resident
      optimizer: AdamW
      precision: bf16_tf32
    task5_cds_to_movies:
      task_id: 5
      source: AM_CDs
      target: AM_Movies
      scenario: strong_related
      direction: reverse
      active_profile: strong_reverse_g1_init
      profile_id: task5_strong_reverse_g1_init
      candidate: task5_strong_reverse_init
      formal_allowed: false
      profile_ready: true
      formal_ready: false
      probe_only: false
      train:
        batch_size: 1536
        per_gpu_batch_size: 768
        lr: 7.0e-4
        max_grad_norm: 0.5
        backend:
          train_precision: bf16
          allow_tf32: true
          amp_autocast: true
          grad_scaler: false
      tokenizer:
        max_length: 48
      evidence:
        max_evidence_length: 48
      scheduler:
        name: warmup_cosine
        warmup_ratio: 0.06
        min_lr_ratio: 0.05
      cross_rank_structured_gather:
        enabled: true
        mode: local_gradient_context
      effective_pool_expected: 1536
      memory:
        activation_checkpointing: false
        profile_buffer_policy: gpu_resident
      optimizer: AdamW
      precision: bf16_tf32
    task8_tripadvisor_to_yelp:
      task_id: 8
      source: TripAdvisor
      target: Yelp
      scenario: weak_cross_platform
      direction: forward
      active_profile: weak_forward_init
      profile_id: task8_weak_forward_init
      candidate: task8_weak_forward_init
      formal_allowed: false
      profile_ready: true
      formal_ready: false
      probe_only: false
      note: isolated weak profile is initialization only; it is not task2 formal-ready
      train:
        batch_size: 1024
        per_gpu_batch_size: 512
        lr: 3.0e-4
        max_grad_norm: 0.5
        backend:
          train_precision: bf16
          allow_tf32: true
          amp_autocast: true
          grad_scaler: false
      tokenizer:
        max_length: 64
      evidence:
        max_evidence_length: 64
      scheduler:
        name: warmup_cosine
        warmup_ratio: 0.06
        min_lr_ratio: 0.05
      cross_rank_structured_gather:
        enabled: true
        mode: local_gradient_context
      effective_pool_expected: 1024
      memory:
        activation_checkpointing: false
        profile_buffer_policy: gpu_resident
      optimizer: AdamW
      precision: bf16_tf32
    task7_yelp_to_tripadvisor:
      task_id: 7
      source: Yelp
      target: TripAdvisor
      scenario: weak_cross_platform
      direction: reverse
      active_profile: weak_reverse_init
      profile_id: task7_weak_reverse_init
      candidate: task7_weak_reverse_init
      formal_allowed: false
      profile_ready: true
      formal_ready: false
      probe_only: false
      note: isolated weak profile is initialization only; it is not task2 formal-ready
      train:
        batch_size: 1024
        per_gpu_batch_size: 512
        lr: 3.0e-4
        max_grad_norm: 0.5
        backend:
          train_precision: bf16
          allow_tf32: true
          amp_autocast: true
          grad_scaler: false
      tokenizer:
        max_length: 64
      evidence:
        max_evidence_length: 64
      scheduler:
        name: warmup_cosine
        warmup_ratio: 0.06
        min_lr_ratio: 0.05
      cross_rank_structured_gather:
        enabled: true
        mode: local_gradient_context
      effective_pool_expected: 1024
      memory:
        activation_checkpointing: false
        profile_buffer_policy: gpu_resident
      optimizer: AdamW
      precision: bf16_tf32
  backup_profiles:
    task2_g1_backup:
      base_task_profile: task2_am_movies_to_cds
      task_profile_id: task2_strong_forward_g1
      candidate: G1
      batch_size: 1536
      per_gpu_batch_size: 768
      ddp_world_size: 2
      cross_rank_structured_gather: true
      gather_mode: local_gradient_context
      effective_pool_expected: 1536
      activation_checkpointing: off
      profile_buffer_policy: gpu_resident
      backup_only: true
      manual_selection_required: true
      not_default: true
      formal_allowed: false
      probe_only: false
    task2_g0_backup:
      base_task_profile: task2_am_movies_to_cds
      task_profile_id: task2_g0_backup
      candidate: G0
      batch_size: 1024
      per_gpu_batch_size: 512
      ddp_world_size: 2
      cross_rank_structured_gather: true
      gather_mode: local_gradient_context
      effective_pool_expected: 1024
      activation_checkpointing: off
      profile_buffer_policy: gpu_resident
      backup_only: true
      manual_selection_required: true
      not_default: true
      formal_allowed: false
      probe_only: false
  exploration_profiles:
    task2_g2_effective_pool_2048:
      base_task_profile: task2_am_movies_to_cds
      task_profile_id: task2_g2_effective_pool_2048
      candidate: G2-2048-pool
      batch_size: 2048
      per_gpu_batch_size: 1024
      ddp_world_size: 2
      cross_rank_structured_gather: true
      gather_mode: local_gradient_context
      effective_pool_expected: 2048
      activation_checkpointing: selective
      profile_buffer_policy: cpu_pinned_batch_gather
      formal_allowed: false
      probe_only: true
      exploration_only: true
      replacement_gate_status: failed_or_not_passed
      promotion_policy: manual_only_after_memory_throughput_and_pilot_all_beat_G1
  optimizer:
    name: adamw
    betas: [0.9, 0.999]
    eps: 1.0e-8
    param_groups:
      dense_weight_decay: 1.0e-2
      special_weight_decay: 1.0e-4
      no_decay: 0.0
    exclude_frozen_evidence_buffers: true
  tokenizer:
    max_length: 48
  evidence:
    max_evidence_length: 48
  scheduler:
    name: warmup_cosine
    warmup_ratio: 0.06
    min_lr_ratio: 0.05
    validation_aware_lr_damping:
      enabled: false
      name: safe_damping_v2
      base_scheduler: warmup_cosine
      formal_allowed: false
      probe_only: true
      monitor_metric: valid_loss
      direction: min
      worsen_abs_threshold: 0.25
      worsen_ratio_threshold: 0.10
      worsen_patience: 3
      lr_decay_factor: 0.5
      min_lr_ratio: 0.05
      cooldown_epochs: 3
      max_damping_events: 2
      start_epoch: 4
      recent_trend_epochs: 2
      recent_recovery_tolerance: 1.0e-3
      effective_lr_floor_abs: 0.0
      effective_lr_floor_ratio: 0.25
      effective_min_lr_policy: safe_floor_no_halve_to_zero
      action_on_max_events: stop_and_select_candidate
      action_on_low_lr_no_progress: stop_and_select_candidate
  objective_drift:
    enabled: true
    valid_loss_abs_threshold: 0.25
    valid_loss_ratio_threshold: 0.10
    severe_valid_loss_abs_threshold: 0.75
    severe_valid_loss_ratio_threshold: 0.20
    component_weighted_delta_threshold: 0.01
    severe_component_count: 3
    statuses: [none, warning, objective_drift, severe_objective_drift]
    actions:
      warning: monitor_recent_trend
      objective_drift: plan_recovery_or_loss_rebalance
      severe_objective_drift: start_recovery
  recovery:
    enabled: true
    trigger: severe_objective_drift
    restart_lr_ratio: 0.25
    recovery_epochs: 8
    max_recoveries: 1
    source_checkpoint_scope: best_observed
    save_drift_checkpoint: true
    recovery_scheduler: short_cosine
    formal_allowed: true
  phase_loss_schedule:
    enabled: true
    transition: epoch_or_objective_drift
    phases:
      - name: primary_fit
        start_epoch: 1
        end_epoch: 2
        loss_multipliers:
          L_rating_shared: 1.0
          L_content_alignment: 1.0
          L_style_alignment: 1.0
          L_shared_proto: 1.0
          L_domain_style_alignment: 0.9
          L_specific_separation: 0.6
          L_variance: 0.7
      - name: csb_sidecar_alignment
        start_epoch: 3
        end_epoch: 24
        loss_multipliers:
          L_rating_shared: 1.0
          L_content_alignment: 0.55
          L_style_alignment: 0.55
          L_specific_separation: 0.35
          L_variance: 0.45
          L_domain_style_alignment: 0.45
          L_prototype_separation: 0.5
      - name: recovery_pareto_candidate
        start_epoch: 25
        end_epoch: null
        loss_multipliers:
          L_rating_shared: 1.0
          L_content_alignment: 0.35
          L_style_alignment: 0.35
          L_specific_separation: 0.25
          L_variance: 0.30
          L_orthogonal: 0.50
          L_domain_style_alignment: 0.30
          L_prototype_separation: 0.35
  conflict_aware:
    enabled: false
    mode: "off"
    allowed_modes: ["off", dynamic_weighting, pcgrad, gradnorm, uncertainty_weighting]
    default_mode: "off"
    formal_allowed: false
    requires_gradient_probe: true
    ddp_graph_safe_zero_required: true
  loss_gradient_conflict_probe:
    enabled: true
    real_data_only: true
    synthetic_benchmark_forbidden: true
    bounded_max_batches: 4
    output_dir: AI_analysis/06_probe_evidence/step3_loss_gradient_conflict_probe
    write_formal_checkpoint: false
  adapter_gating:
    enabled: false
    formal_allowed: false
    requires_gradient_probe: true
    rating_adapter: off
    shared_specific_gate: off
    explainer_adapter: off
    style_content_residual_gate: off
    checkpoint_compatibility: disabled_no_state_change
  paper_candidate_selection:
    enabled: false
    eval_protocol: paper_target_only_eval
    bounded_eval_required: true
    candidate_pool: [best_observed, best_after_min_epochs, top_k_valid_loss, milestone, recovery, csb_stable, csb_control, ema, checkpoint_average]
    no_paper_eval_no_selection: true
    scorer_explainer_split: true
    rating_guard:
      max_mae: 0.65
      max_rmse: 0.95
      max_mae_worse_abs: 0.02
      max_rmse_worse_abs: 0.03
    diversity_guard:
      dist1_floor: 0.05
      dist2_floor: 0.20
      collapse_penalty: 100.0
    composite_weights:
      rouge_l: 0.30
      bleu4: 0.25
      meteor: 0.25
      dist1: 0.10
      dist2: 0.10
    outputs:
      paper_candidate_selection: paper_candidate_selection.json
      candidate_eval_registry: candidate_eval_registry.jsonl
